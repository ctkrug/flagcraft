<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flagcraft — A linter for your CLI's --help output</title>
    <meta
      name="description"
      content="Paste your CLI's --help output and lint it against the Command Line Interface Guidelines: flag casing, missing -h/--help, ambiguous short flags, exit codes."
    />
    <meta property="og:title" content="Flagcraft — A linter for your CLI's --help output" />
    <meta
      property="og:description"
      content="Paste your CLI's --help output and lint it against the Command Line Interface Guidelines, with every finding cited to the guideline it breaks."
    />
    <meta property="og:type" content="website" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230a0d0a'/%3E%3Ctext x='16' y='23' font-family='monospace' font-size='18' font-weight='700' fill='%23ffb000' text-anchor='middle'%3E%3E_%3C/text%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <div id="app">
      <header class="app-header">
        <h1 class="wordmark">flagcraft<span class="cursor" aria-hidden="true">_</span></h1>
        <p class="tagline">Grade your <code>--help</code> output against the CLI Guidelines.</p>
      </header>

      <main class="grader">
        <section class="pane pane-input">
          <div class="pane-input-header">
            <label class="pane-label" for="help-input">Paste --help output</label>
            <div id="presets" class="presets" role="group" aria-label="Load a sample --help output"></div>
          </div>
          <textarea
            id="help-input"
            placeholder="$ yourcli --help&#10;&#10;paste the output here..."
            spellcheck="false"
          ></textarea>
        </section>

        <section class="pane pane-output" aria-live="polite">
          <h2 class="pane-label">Report</h2>
          <div id="report"></div>
        </section>
      </main>
    </div>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
